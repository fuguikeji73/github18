<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>计划大全</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .header {
            padding: 15px 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .title {
            color: #d4af37;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 6px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .subtitle {
            color: #666;
            font-size: 11px;
            margin-top: 4px;
            letter-spacing: 3px;
        }

        .btn-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 10px 25px;
            gap: 8px;
        }

        .btn {
            display: flex;
            align-items: center;
            padding: 0 20px;
            height: calc((100vh - 100px) / 11 - 8px);
            min-height: 45px;
            max-height: 60px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15) 0%, rgba(212, 175, 55, 0.05) 100%);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 30px;
            color: #d4af37;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            position: relative;
            box-shadow: 
                0 4px 15px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 30px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.3) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn:hover,
        .btn:active {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.3) 0%, rgba(212, 175, 55, 0.1) 100%);
            border-color: #d4af37;
            transform: scale(1.02);
            box-shadow: 
                0 6px 25px rgba(212, 175, 55, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .btn:hover::before,
        .btn:active::before {
            opacity: 1;
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #d4af37 0%, #b8941a 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            flex-shrink: 0;
            color: #0a0a0a;
            font-size: 13px;
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(212, 175, 55, 0.4);
        }

        .btn-text {
            flex: 1;
            text-align: center;
            font-size: 24px
        }

        .btn-arrow {
            color: rgba(212, 175, 55, 0.6);
            font-size: 18px;
        }

        .footer {
            padding: 12px;
            text-align: center;
            flex-shrink: 0;
        }

        .footer-text {
            color: #444;
            font-size: 10px;
            letter-spacing: 3px;
        }

        .gold-line {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            margin: 0 auto 8px;
        }
    </style>
</head>
<body>

</html>
